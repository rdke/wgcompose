<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>wgcompose</title>
<meta name="description" content="WireGuard config generator">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%2388171a'/><g transform='translate(4 4)' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='3'/><path d='M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z'/></g></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>wgcompose<span class="tagline">WireGuard config generator • <a href="https://github.com/rdke/wgcompose" target="_blank" rel="noopener noreferrer">GitHub</a></span></h1>

<div id="webcrypto-error" class="err hidden">
  Your browser does not support WebCrypto X25519. Use Chrome 123+, Firefox 130+, or Safari 17+.
</div>

<div class="section">
  <h2>General settings</h2>
  <div class="row">
    <div>
      <label for="subnet">IPv4 subnet</label>
      <input type="text" id="subnet" value="10.69.69.0/24">
    </div>
    <div>
      <label for="ipv6-mode">IPv6 subnet</label>
      <div class="preset-input" id="ipv6-picker">
        <select id="ipv6-mode">
          <option value="off" selected>Disabled</option>
          <option value="fd69:69:69::/64">fd69:69:69::/64</option>
          <option value="custom">Custom</option>
        </select>
        <div class="custom-row">
          <input type="text" id="subnet6" placeholder="fd00::/64">
          <button type="button" class="back-btn" data-back="ipv6" title="Use preset" aria-label="Use preset"></button>
        </div>
      </div>
    </div>
    <div class="col-narrow">
      <label for="dns-preset">DNS</label>
      <div class="preset-input" id="dns-picker">
        <select id="dns-preset">
          <option value="8.8.8.8" selected>Google</option>
          <option value="1.1.1.1">Cloudflare</option>
          <option value="custom">Custom</option>
        </select>
        <div class="custom-row">
          <input type="text" id="dns-custom" placeholder="9.9.9.9">
          <button type="button" class="back-btn" data-back="dns" title="Use preset" aria-label="Use preset"></button>
        </div>
      </div>
    </div>
    <div class="col-narrow">
      <label for="mtu-mode">MTU</label>
      <div class="preset-input" id="mtu-picker">
        <select id="mtu-mode">
          <option value="auto" selected>Auto</option>
          <option value="custom">Custom</option>
        </select>
        <div class="custom-row">
          <input type="number" id="mtu" placeholder="MTU">
          <button type="button" class="back-btn" data-back="mtu" title="Use auto" aria-label="Use auto"></button>
        </div>
      </div>
    </div>
    <div class="col-narrow">
      <label for="keepalive">Keepalive</label>
      <input type="number" id="keepalive" value="10" min="0" max="65535">
    </div>
  </div>
</div>

<div id="client-list">
  <div class="section" data-client-idx="0">
    <div class="server-header"><h2>Client</h2></div>
    <div class="keys-row">
      <div>
        <label>Private key</label>
        <input type="text" data-cfield="priv" data-idx="0">
      </div>
      <div>
        <label>Public key</label>
        <input type="text" data-cfield="pub" data-idx="0">
      </div>
      <button class="dark-gray" data-action="gen-client" data-idx="0">Generate</button>
    </div>
  </div>
</div>
<div class="server-list-actions">
  <button id="add-client" class="wg-red">+ Add client</button>
</div>

<div id="server-list">
  <div class="section" data-idx="0">
    <div class="server-header"><h2>Server</h2></div>
    <div class="row">
      <div>
        <label>Hostname</label>
        <input type="text" data-field="host" data-idx="0" placeholder="vpn.example.com">
      </div>
      <div class="col-narrow">
        <label>Port</label>
        <input type="number" data-field="port" data-idx="0" value="51820">
      </div>
      <div class="col-narrow">
        <label>Interface</label>
        <input type="text" data-field="iface" data-idx="0" value="eth0">
      </div>
    </div>
    <div class="keys-row">
      <div>
        <label>Private key</label>
        <input type="text" data-field="priv" data-idx="0">
      </div>
      <div>
        <label>Public key</label>
        <input type="text" data-field="pub" data-idx="0">
      </div>
      <button class="dark-gray" data-action="gen" data-idx="0">Generate</button>
    </div>
  </div>
</div>
<div id="vpnprovider-list"></div>
<div class="server-list-actions">
  <button id="add-server" class="wg-red">+ Add server</button>
  <button id="add-vpnprovider" class="wg-red">+ Add VPN Provider</button>
</div>

<div class="section">
  <h2>Generated configs</h2>
  <div id="output"></div>
</div>

<script src="app.js" defer></script>

</body>
</html>
